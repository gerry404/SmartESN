server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA : toutes les routes inconnues renvoient index.html (Vue Router en mode history)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache long pour les assets versionnés
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
